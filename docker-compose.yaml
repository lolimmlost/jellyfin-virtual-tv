services:
  virtual-tv:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: virtual-tv
    ports:
      - "3336:3000"
    volumes:
      - vtv-data:/app/data
    environment:
      # Required: set these in your .env (or Coolify Environment Variables UI).
      # Coolify does NOT honour docker-compose's ${VAR:?error} shorthand and
      # would store the error text as the value, producing broken M3U/EPG URLs.
      - JELLYFIN_URL=${JELLYFIN_URL}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY}
      - BASE_URL=${BASE_URL}
      - PORT=3000
      - NODE_ENV=production
      - DB_PATH=/app/data/virtual-tv.db
      - SCHEDULE_TZ=${SCHEDULE_TZ:-America/Los_Angeles}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  vtv-data:
